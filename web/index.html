<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Composer Galaxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #f4f3ef;
    --panel: #ffffff;
    --border: #d8d6ce;
    --text: #2a2a2e;
    --muted: #7a7a82;
    --accent: #9a7430;
    --wiki: #8a6820;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
  #app { display: grid; grid-template-columns: 240px 1fr 300px; height: 100vh;
    transition: grid-template-columns 0.25s ease; }
  #app.hide-left { grid-template-columns: 0px 1fr 300px; }
  #app.hide-right { grid-template-columns: 240px 1fr 0px; }
  #app.hide-left.hide-right { grid-template-columns: 0px 1fr 0px; }
  #app.hide-left #sidebar, #app.hide-right #detail { padding: 0; overflow: hidden; border: none; }
  .panel-toggle { position: absolute; top: 12px; z-index: 20; width: 32px; height: 32px;
    background: var(--panel); border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; cursor: pointer; font-size: 14px; display: flex;
    align-items: center; justify-content: center; padding: 0; }
  .panel-toggle:hover { color: var(--text); background: #e8e6de; }
  #toggleLeft { left: 12px; }
  #toggleRight { right: 12px; }
  #sidebar, #detail { background: var(--panel); border-right: 1px solid var(--border);
    padding: 16px; overflow-y: auto; }
  #detail { border-right: none; border-left: 1px solid var(--border); }
  #graph-area { position: relative; overflow: hidden; }
  canvas { display: block; }
  h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; margin: 0 0 14px 0;
    letter-spacing: 0.3px; color: var(--accent); }
  h2 { font-size: 13px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.8px; margin: 16px 0 8px 0; font-weight: 600; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  select, button { width: 100%; padding: 6px 8px; background: var(--bg);
    color: var(--text); border: 1px solid var(--border); border-radius: 4px;
    font-size: 13px; margin-bottom: 8px; cursor: pointer; }
  button:hover { background: #e8e6de; }
  .legend { font-size: 12px; color: var(--muted); line-height: 1.8; }
  .legend .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    vertical-align: middle; margin-right: 6px; }
  .detail-row { margin: 4px 0; font-size: 13px; }
  .detail-row .k { color: var(--muted); display: inline-block; width: 90px; }
  .edge-list { font-size: 12px; color: var(--text); margin: 6px 0 0 0; padding-left: 16px; }
  .edge-list li { margin: 2px 0; cursor: pointer; }
  .edge-list li:hover { color: var(--accent); }
  .conf-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 600;
    letter-spacing: .03em; padding: 1px 5px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }
  .conf-high { background: #1a3a2a; color: #4ade80; }
  .conf-mid { background: #2a2a1a; color: #d4a843; }
  .conf-low { background: #3a1a1a; color: #ef8888; }
  .conf-bar { display: inline-block; width: 24px; height: 4px; border-radius: 2px; background: #333; position: relative; overflow: hidden; }
  .conf-bar-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 2px; }
  .edge-prov { font-size: 10px; color: var(--muted); margin-top: 2px; padding-left: 0; }
  .llm-quote { display: none; font-size: 11px; color: #5a7a8a; font-style: italic;
    margin: 2px 0 4px 0; padding-left: 8px; border-left: 2px solid #3a7ac0; }
  .llm-quote.open { display: block; }
  a { color: var(--accent); }
  button.view-active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #searchWrap { position: relative; margin-bottom: 8px; }
  #searchInput { width: 100%; padding: 6px 8px; background: var(--bg);
    color: var(--text); border: 1px solid var(--border); border-radius: 4px;
    font-size: 13px; outline: none; }
  #searchInput:focus { border-color: var(--accent); }
  #searchResults { display: none; position: absolute; top: 100%; left: 0; right: 0;
    background: var(--panel); border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 4px 4px; margin: 0; padding: 0; list-style: none;
    max-height: 240px; overflow-y: auto; z-index: 20; }
  #searchResults li { padding: 6px 8px; font-size: 13px; cursor: pointer; }
  #searchResults li:hover, #searchResults li.active { background: var(--bg); color: var(--accent); }
  input[type="range"] { -webkit-appearance: none; height: 4px; background: var(--border);
    border-radius: 2px; outline: none; margin: 6px 0 8px 0; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px;
    background: var(--accent); border-radius: 50%; cursor: pointer; }
  .empty { color: var(--muted); font-style: italic; font-size: 13px; }
  #expandStatus { position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--accent); color: var(--accent);
    padding: 6px 16px; border-radius: 4px; font-size: 13px; display: none; z-index: 10; }
  #tooltip { position: absolute; pointer-events: none; background: rgba(255,255,255,0.95);
    border: 1px solid var(--border); color: var(--text); padding: 4px 10px;
    border-radius: 4px; font-size: 12px; display: none; z-index: 10; white-space: nowrap; }
  #zoomControls { position: absolute; bottom: 16px; right: 16px; display: flex;
    flex-direction: column; gap: 4px; z-index: 10; }
  #zoomControls button { width: 36px; height: 36px; padding: 0; font-size: 18px;
    line-height: 36px; text-align: center; border-radius: 6px; }
</style>
</head>
<body>
<div id="expandStatus">Expanding…</div>
<div id="app">
  <aside id="sidebar">
    <h1>Composer Galaxy</h1>

    <h2>Filters</h2>

    <label>Era</label>
    <select id="eraFilter"><option value="">All eras</option></select>

    <label style="display:flex;align-items:center;gap:6px;margin:8px 0">
      <input type="checkbox" id="womenFilter" style="width:auto;margin:0">
      Women composers only
    </label>

    <label>Degrees of separation: <span id="depthValue">1</span></label>
    <input type="range" id="depthSlider" min="1" max="6" value="1" style="width:100%">

    <label>Min confidence: <span id="confValue">0%</span></label>
    <input type="range" id="confSlider" min="0" max="100" value="0" style="width:100%">

    <h2>Search Composer</h2>
    <div id="searchWrap">
      <input type="text" id="searchInput" placeholder="Type a composer name…"
        autocomplete="off" spellcheck="false">
      <ul id="searchResults"></ul>
    </div>

    <h2>Ask Me Anything</h2>
    <div id="askWrap">
      <input type="text" id="askInput" placeholder="e.g. Who had the most students?"
        autocomplete="off" spellcheck="false"
        style="width:100%;padding:6px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:13px;outline:none;margin-bottom:4px">
      <button id="askBtn">Ask</button>
      <div id="askAnswer" style="font-size:12px;color:var(--text);margin-top:6px;white-space:pre-wrap;display:none;max-height:300px;overflow-y:auto;line-height:1.5"></div>
    </div>

    <h2>Trace Lineage</h2>
    <div id="pathWrap">
      <div style="position:relative;margin-bottom:4px">
        <input type="text" id="pathFrom" placeholder="From…"
          autocomplete="off" spellcheck="false"
          style="width:100%;padding:6px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:13px;outline:none">
        <ul id="pathFromResults" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--panel);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;margin:0;padding:0;list-style:none;max-height:160px;overflow-y:auto;z-index:20"></ul>
      </div>
      <div style="position:relative;margin-bottom:4px">
        <input type="text" id="pathTo" placeholder="To…"
          autocomplete="off" spellcheck="false"
          style="width:100%;padding:6px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:13px;outline:none">
        <ul id="pathToResults" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--panel);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;margin:0;padding:0;list-style:none;max-height:160px;overflow-y:auto;z-index:20"></ul>
      </div>
      <button id="pathFind">Trace Lineage</button>
      <button id="pathClear" style="display:none;background:var(--accent);color:white;border:none">Clear Lineage</button>
      <div id="pathStatus" style="font-size:12px;color:var(--muted);margin-bottom:4px"></div>
    </div>

    <h2>Legend</h2>
    <div class="legend" id="legendEras"></div>
    <div class="legend" style="margin-top:8px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:bold">Accuracy confidence level</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px"><span style="display:inline-block;width:28px;height:2px;background:#e0c14a;border-radius:2px"></span> confirmed (85%+)</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px"><span style="display:inline-block;width:28px;height:2px;background:#468cd2;border-radius:2px"></span> single source (80%)</div>
    </div>

    <h2>Stats</h2>
    <div id="stats" class="legend">Loading…</div>
  </aside>

  <div id="graph-area">
    <canvas id="canvas"></canvas>
    <button id="toggleLeft" class="panel-toggle" title="Toggle sidebar">◀</button>
    <button id="toggleRight" class="panel-toggle" title="Toggle details">▶</button>
    <div id="tooltip"></div>
    <div id="zoomControls">
      <button id="zoomIn">+</button>
      <button id="zoomOut">−</button>
      <button id="zoomFit">⊡</button>
    </div>
  </div>

  <aside id="detail">
    <h1>Details</h1>
    <div id="detailBody" class="empty">Click a composer to see details.</div>
  </aside>
</div>

<script>
const ERA_ORDER = ["Contemporary", "20th-century", "Romantic", "Classical", "Baroque", "Renaissance", "Medieval"];
const ERA_RANGES = {
  "Medieval": [1100, 1400], "Renaissance": [1400, 1600], "Baroque": [1600, 1750],
  "Classical": [1750, 1820], "Romantic": [1820, 1910], "20th-century": [1910, 1975],
  "Contemporary": [1975, 2030],
};
const ERA_COLORS = {
  "Medieval": "#5a6a8a", "Renaissance": "#6a8a5a", "Baroque": "#8a6a3a",
  "Classical": "#aa8a4a", "Romantic": "#b06060", "20th-century": "#7a5aa0",
  "Contemporary": "#4a8090", "Modern": "#7a5aa0",
};

function eraFromBirth(birth) {
  const y = parseInt(birth);
  if (isNaN(y)) return null;
  for (const [era, [lo, hi]] of Object.entries(ERA_RANGES)) {
    if (y >= lo && y < hi) return era;
  }
  return null;
}

function eraBucket(era, birth) {
  let fromText = null;
  if (era) {
    const e = era.toLowerCase();
    if (e.includes("medieval")) fromText = "Medieval";
    else if (e.includes("renaissance")) fromText = "Renaissance";
    else if (e.includes("baroque")) fromText = "Baroque";
    else if (e.includes("classical") && !e.includes("20")) fromText = "Classical";
    else if (e.includes("romantic")) fromText = "Romantic";
    else if (e.includes("20th") || e.includes("modern")) fromText = "20th-century";
    else if (e.includes("contemp") || e.includes("21st")) fromText = "Contemporary";
  }
  const fromBirth = eraFromBirth(birth);
  if (!fromText) return fromBirth;
  if (!fromBirth) return fromText;
  // If text-based era contradicts birth year, trust the birth year
  const [lo, hi] = ERA_RANGES[fromText];
  const y = parseInt(birth);
  if (y < lo - 30 || y >= hi + 30) return fromBirth;
  return fromText;
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const graphArea = document.getElementById("graph-area");
const tooltip = document.getElementById("tooltip");

let nodes = [], links = [], nodeById = {};
let simulation;
let transform = d3.zoomIdentity;
let hoveredNode = null, selectedNode = null, hoveredLink = null;
let connectionDepth = 1;
let currentData = null;
let morphProgress = 1, morphTimer = null, galaxyPositions = {};
let viewMode = "teachers"; // "teachers" or "mentors"
let familyTreeMode = false, _familyTreeNodes = new Set(), _familyTreeLinks = new Set(), _familyTreeRoot = null;

let minConfidence = 0;
const _isLocalhost = location.hostname === "localhost" || location.hostname === "127.0.0.1";

function activeLinks() {
  const kind = viewMode === "teachers" ? "teacher" : "mentor";
  return links.filter(l => l.kind === kind && l.confidence >= minConfidence);
}

// Silhouette bust SVG as data URI fallback
const SILHOUETTE_URI = "data:image/svg+xml," + encodeURIComponent(
  `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#2a2d3d"/>
    <ellipse cx="50" cy="38" rx="18" ry="22" fill="#6a6d8d"/>
    <ellipse cx="50" cy="90" rx="30" ry="24" fill="#6a6d8d"/>
  </svg>`
);
const silhouetteImg = new Image();
silhouetteImg.src = SILHOUETTE_URI;

// Image cache for thumbnails
const imageCache = {};
function _thumbUrl(url) {
  if (!url) return url;
  if (url.includes("wikimedia.org") || url.includes("wikipedia.org")) return url;
  return "/img-proxy?url=" + encodeURIComponent(url);
}
function loadImage(url) {
  if (imageCache[url]) return imageCache[url];
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = _thumbUrl(url);
  img.onload = () => draw();
  imageCache[url] = img;
  return img;
}

function resize() {
  const r = graphArea.getBoundingClientRect();
  canvas.width = r.width * devicePixelRatio;
  canvas.height = r.height * devicePixelRatio;
  canvas.style.width = r.width + "px";
  canvas.style.height = r.height + "px";
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}

const TOP_COMPOSERS = new Set([
  "Wolfgang Amadeus Mozart", "Ludwig van Beethoven", "Johann Sebastian Bach",
  "Frédéric Chopin", "Richard Wagner", "Pyotr Ilyich Tchaikovsky",
  "Claude Debussy", "Leonard Bernstein", "Franz Liszt", "George Frideric Handel",
  "George Gershwin", "Antonio Vivaldi", "Franz Schubert", "Joseph Haydn",
  "Igor Stravinsky", "Dmitri Shostakovich", "Sergei Rachmaninoff", "Philip Glass",
  "Johannes Brahms", "Felix Mendelssohn", "Gustav Mahler", "Antonín Dvořák",
  "Robert Schumann", "Hildegard of Bingen", "Maurice Ravel", "John Cage",
  "Arnold Schoenberg", "Erik Satie", "Sergei Prokofiev", "Camille Saint-Saëns",
  "Richard Strauss", "Edvard Grieg", "Jean Sibelius", "Aaron Copland",
  "Gioachino Rossini", "Béla Bartók", "Benjamin Britten", "Hector Berlioz",
  "Karlheinz Stockhausen", "Steve Reich", "Modest Mussorgsky", "Clara Schumann",
  "Gabriel Fauré", "Olivier Messiaen", "Pierre Boulez", "Anton Bruckner",
  "Charles Ives", "Vincenzo Bellini", "Krzysztof Penderecki", "Jean-Philippe Rameau",
]);

function nodeRadius(n) {
  if (n.stub) return 5;
  if (TOP_COMPOSERS.has(n.label)) return n.thumbnail ? 28 : 22;
  return n.thumbnail ? 14 : 10;
}

function nodeColor(n) {
  if (n.stub) return "#3a3d4d";
  return ERA_COLORS[n.eraBucket] || "#6a6d8d";
}


// --- Family Tree ---
function buildFamilyTree(rootNode) {
  const treeNodes = new Set([rootNode]);
  const treeLinks = new Set();
  const teacherKind = viewMode === "teachers" ? "teacher" : "mentor";

  // Build adjacency for the active edge kind
  const parentsOf = new Map(); // node -> [{node, link}] (teachers/sources)
  const childrenOf = new Map(); // node -> [{node, link}] (students/targets)
  for (const l of links) {
    if (l.kind !== teacherKind) continue;
    const s = typeof l.source === "object" ? l.source : nodeById[l.source];
    const t = typeof l.target === "object" ? l.target : nodeById[l.target];
    if (!s || !t) continue;
    if (!parentsOf.has(t)) parentsOf.set(t, []);
    parentsOf.get(t).push({ node: s, link: l });
    if (!childrenOf.has(s)) childrenOf.set(s, []);
    childrenOf.get(s).push({ node: t, link: l });
  }

  // BFS upstream (ancestors / teachers)
  const ancestors = new Map(); // node -> generation (negative: -1 = direct teacher, -2 = grandteacher)
  ancestors.set(rootNode, 0);
  let queue = [{ n: rootNode, gen: 0 }];
  while (queue.length) {
    const { n, gen } = queue.shift();
    for (const { node: parent, link } of (parentsOf.get(n) || [])) {
      treeLinks.add(link);
      treeNodes.add(parent);
      if (!ancestors.has(parent)) {
        ancestors.set(parent, gen - 1);
        queue.push({ n: parent, gen: gen - 1 });
      }
    }
  }

  // BFS downstream (descendants / students)
  const descendants = new Map();
  descendants.set(rootNode, 0);
  queue = [{ n: rootNode, gen: 0 }];
  while (queue.length) {
    const { n, gen } = queue.shift();
    for (const { node: child, link } of (childrenOf.get(n) || [])) {
      treeLinks.add(link);
      treeNodes.add(child);
      if (!descendants.has(child)) {
        descendants.set(child, gen + 1);
        queue.push({ n: child, gen: gen + 1 });
      }
    }
  }

  // Merge generations: ancestors have negative gen, descendants positive, root is 0
  const generations = new Map();
  for (const [n, gen] of ancestors) generations.set(n, gen);
  for (const [n, gen] of descendants) {
    if (!generations.has(n)) generations.set(n, gen);
  }

  return { treeNodes, treeLinks, generations };
}

function layoutFamilyTree(rootNode, generations) {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;

  const genGroups = new Map();
  for (const [n, gen] of generations) {
    if (!genGroups.has(gen)) genGroups.set(gen, []);
    genGroups.get(gen).push(n);
  }

  const gens = [...genGroups.keys()].sort((a, b) => a - b);
  const minGen = gens[0] || 0;
  const maxGen = gens[gens.length - 1] || 0;
  const genSpan = maxGen - minGen || 1;

  const genSpacing = 200;
  const centerY = h / 2;
  const padX = 60;
  const nodeSpacingBase = 100;

  // Build adjacency between generations
  const visibleKind = viewMode === "teachers" ? "teacher" : "mentor";
  const neighbors = new Map();
  for (const l of links) {
    if (l.kind !== visibleKind) continue;
    const s = typeof l.source === "object" ? l.source : nodeById[l.source];
    const t = typeof l.target === "object" ? l.target : nodeById[l.target];
    if (!generations.has(s) || !generations.has(t)) continue;
    if (!neighbors.has(s)) neighbors.set(s, []);
    if (!neighbors.has(t)) neighbors.set(t, []);
    neighbors.get(s).push(t);
    neighbors.get(t).push(s);
  }

  // Initial order: birth year
  for (const [gen, group] of genGroups) {
    group.sort((a, b) => (parseInt(a.birth) || 1800) - (parseInt(b.birth) || 1800));
  }

  // Assign initial x positions
  const xPos = new Map();
  function assignX(gen) {
    const group = genGroups.get(gen);
    const totalWidth = (group.length - 1) * nodeSpacingBase;
    const startX = w / 2 - totalWidth / 2;
    group.forEach((n, i) => xPos.set(n, startX + i * nodeSpacingBase));
  }
  for (const gen of gens) assignX(gen);

  // Barycenter passes: reorder each generation by average x of neighbors
  for (let pass = 0; pass < 4; pass++) {
    // Sweep down (from ancestors toward descendants)
    for (const gen of gens) {
      const group = genGroups.get(gen);
      group.sort((a, b) => {
        const aN = (neighbors.get(a) || []).filter(n => {
          const ng = generations.get(n);
          return ng !== undefined && ng < gen;
        });
        const bN = (neighbors.get(b) || []).filter(n => {
          const ng = generations.get(n);
          return ng !== undefined && ng < gen;
        });
        const aAvg = aN.length ? aN.reduce((s, n) => s + (xPos.get(n) || 0), 0) / aN.length : xPos.get(a) || 0;
        const bAvg = bN.length ? bN.reduce((s, n) => s + (xPos.get(n) || 0), 0) / bN.length : xPos.get(b) || 0;
        return aAvg - bAvg;
      });
      assignX(gen);
    }
    // Sweep up (from descendants toward ancestors)
    for (let i = gens.length - 1; i >= 0; i--) {
      const gen = gens[i];
      const group = genGroups.get(gen);
      group.sort((a, b) => {
        const aN = (neighbors.get(a) || []).filter(n => {
          const ng = generations.get(n);
          return ng !== undefined && ng > gen;
        });
        const bN = (neighbors.get(b) || []).filter(n => {
          const ng = generations.get(n);
          return ng !== undefined && ng > gen;
        });
        const aAvg = aN.length ? aN.reduce((s, n) => s + (xPos.get(n) || 0), 0) / aN.length : xPos.get(a) || 0;
        const bAvg = bN.length ? bN.reduce((s, n) => s + (xPos.get(n) || 0), 0) / bN.length : xPos.get(b) || 0;
        return aAvg - bAvg;
      });
      assignX(gen);
    }
  }

  const positions = {};
  for (const gen of gens) {
    const group = genGroups.get(gen);
    const y = centerY + gen * genSpacing;
    group.forEach(n => {
      positions[n.id] = { x: xPos.get(n), y };
    });
  }

  const totalH = Math.max(h, genSpan * genSpacing + 200);
  return { positions, totalW: totalH };
}

function showFamilyTree(rootNode) {
  const { treeNodes, treeLinks, generations } = buildFamilyTree(rootNode);

  if (treeNodes.size <= 1) return;

  // Save current positions for morph
  const morphFrom = {};
  nodes.forEach(n => { morphFrom[n.id] = { x: n.x, y: n.y }; });

  // Store pre-tree state for restoration
  if (!familyTreeMode) {
    galaxyPositions = {};
    nodes.forEach(n => { galaxyPositions[n.id] = { x: n.x, y: n.y }; });
  }

  familyTreeMode = true;
  _familyTreeNodes = treeNodes;
  _familyTreeLinks = treeLinks;
  _familyTreeRoot = rootNode;

  // Stop simulation
  if (simulation) simulation.stop();

  // Compute layout
  const { positions: treePositions, totalW } = layoutFamilyTree(rootNode, generations);

  // Set connected flags
  nodes.forEach(n => { n._connected = treeNodes.has(n); });
  links.forEach(l => { l.visible = treeLinks.has(l); });

  // Count generations for status
  const gens = new Set(generations.values());
  const ancestorCount = [...generations.values()].filter(g => g < 0).length;
  const descendantCount = [...generations.values()].filter(g => g > 0).length;
  document.getElementById("pathStatus").textContent =
    `Family tree: ${ancestorCount} ancestor${ancestorCount !== 1 ? "s" : ""}, ${descendantCount} descendant${descendantCount !== 1 ? "s" : ""}`;
  document.getElementById("pathClear").style.display = "none";
  const clearBtn = document.getElementById("familyTreeClearBtn");
  if (clearBtn) clearBtn.style.display = "block";

  // Morph animation
  morphProgress = 0;
  if (morphTimer) cancelAnimationFrame(morphTimer);
  const duration = 900;
  const startTime = performance.now();

  function animateMorph(now) {
    const elapsed = now - startTime;
    morphProgress = Math.min(1, elapsed / duration);
    const t = morphProgress < 0.5
      ? 2 * morphProgress * morphProgress
      : 1 - Math.pow(-2 * morphProgress + 2, 2) / 2;

    nodes.forEach(n => {
      const from = morphFrom[n.id];
      const to = treePositions[n.id];
      if (from && to) {
        n.x = from.x + (to.x - from.x) * t;
        n.y = from.y + (to.y - from.y) * t;
      }
    });
    draw();

    if (morphProgress < 1) {
      morphTimer = requestAnimationFrame(animateMorph);
    } else {
      morphTimer = null;
      // Zoom to fit the tree
      const treeNodesArr = [...treeNodes];
      let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
      treeNodesArr.forEach(n => {
        x0 = Math.min(x0, n.x); y0 = Math.min(y0, n.y);
        x1 = Math.max(x1, n.x); y1 = Math.max(y1, n.y);
      });
      const w = canvas.width / devicePixelRatio;
      const h = canvas.height / devicePixelRatio;
      const pad = 80;
      const dx = (x1 - x0) || 1, dy = (y1 - y0) || 1;
      const scale = Math.min((w - pad * 2) / dx, (h - pad * 2) / dy, 2.5);
      const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
      const tx = w / 2 - cx * scale, ty = h / 2 - cy * scale;
      d3.select(canvas).transition().duration(600)
        .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }
  }

  morphTimer = requestAnimationFrame(animateMorph);
}

function clearFamilyTree() {
  if (!familyTreeMode) return;

  const morphFrom = {};
  nodes.forEach(n => { morphFrom[n.id] = { x: n.x, y: n.y }; });

  familyTreeMode = false;
  _familyTreeNodes = new Set();
  _familyTreeLinks = new Set();
  _familyTreeRoot = null;
  selectedNode = null;
  nodes.forEach(n => { n._connected = false; n.fx = null; n.fy = null; });
  links.forEach(l => l.visible = false);
  document.getElementById("pathStatus").textContent = "";
  document.getElementById("pathClear").style.display = "none";
  document.getElementById("pathClear").textContent = "Clear Lineage";
  clearDetail();

  // Morph back
  morphProgress = 0;
  if (morphTimer) cancelAnimationFrame(morphTimer);
  const duration = 900;
  const startTime = performance.now();

  function animateMorph(now) {
    const elapsed = now - startTime;
    morphProgress = Math.min(1, elapsed / duration);
    const t = morphProgress < 0.5
      ? 2 * morphProgress * morphProgress
      : 1 - Math.pow(-2 * morphProgress + 2, 2) / 2;

    nodes.forEach(n => {
      const from = morphFrom[n.id];
      const to = galaxyPositions[n.id];
      if (from && to) {
        n.x = from.x + (to.x - from.x) * t;
        n.y = from.y + (to.y - from.y) * t;
      }
    });
    draw();

    if (morphProgress < 1) {
      morphTimer = requestAnimationFrame(animateMorph);
    } else {
      morphTimer = null;
      initSimulation();
    }
  }

  morphTimer = requestAnimationFrame(animateMorph);
}



function draw() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  const _pendingLabels = [];
  ctx.save();
  ctx.fillStyle = "#12131a";
  ctx.fillRect(0, 0, w, h);
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  // Draw edges — always visible, dim by default, bright when connected to selection
  const visibleKind = viewMode === "teachers" ? "teacher" : "mentor";
  for (const link of links) {
    if (link.kind !== visibleKind) continue;
    if (link.confidence < minConfidence) continue;
    const s = link.source, t = link.target;
    if (familyTreeMode) { if (!_familyTreeLinks.has(link)) continue; }
    else if (s.hidden || t.hidden) continue;
    const hoveredConn = !selectedNode && hoveredNode && (s === hoveredNode || t === hoveredNode);
    const active = link.visible || link === hoveredLink || hoveredConn;
    const isMentor = link.kind === "mentor";
    const confirmed = link.confidence >= 0.85;

    const onPath = _pathLinks.has(link);
    const onTree = _familyTreeLinks.has(link);
    ctx.beginPath();
    if (isMentor && !onPath && !onTree) {
      ctx.setLineDash([4, 4]);
    } else {
      ctx.setLineDash([]);
    }
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);
    if (onPath) {
      ctx.strokeStyle = "rgba(0,220,255,0.95)";
      ctx.lineWidth = 3;
    } else if (onTree) {
      ctx.strokeStyle = "rgba(0,220,255,0.7)";
      ctx.lineWidth = 2;
    } else if (isMentor) {
      ctx.strokeStyle = active ? "rgba(180,120,220,0.8)" : confirmed ? "rgba(138,141,160,0.4)" : "rgba(138,141,160,0.2)";
      ctx.lineWidth = active ? 2 : confirmed ? 0.7 : 0.4;
    } else {
      ctx.strokeStyle = active ? (confirmed ? "rgba(224,193,74,0.7)" : "rgba(70,140,220,0.7)") : confirmed ? "rgba(138,141,160,0.4)" : "rgba(138,141,160,0.2)";
      ctx.lineWidth = active ? 2 : confirmed ? 0.7 : 0.4;
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrow on active or tree edges
    if (active || onTree) {
      const angle = Math.atan2(t.y - s.y, t.x - s.x);
      const r = nodeRadius(t) + 3;
      const ax = t.x - Math.cos(angle) * r;
      const ay = t.y - Math.sin(angle) * r;
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax - 8 * Math.cos(angle - 0.3), ay - 8 * Math.sin(angle - 0.3));
      ctx.lineTo(ax - 8 * Math.cos(angle + 0.3), ay - 8 * Math.sin(angle + 0.3));
      ctx.closePath();
      ctx.fillStyle = onTree ? "rgba(0,220,255,0.7)" : isMentor ? "rgba(180,120,220,0.8)" : "rgba(224,193,74,0.7)";
      ctx.fill();
    }
  }

  // Precompute nodes connected to hovered node
  const _hoverConnected = new Set();
  if (hoveredNode && !selectedNode) {
    for (const l of activeLinks()) {
      const s = typeof l.source === "object" ? l.source : nodeById[l.source];
      const t = typeof l.target === "object" ? l.target : nodeById[l.target];
      if (s === hoveredNode) _hoverConnected.add(t);
      else if (t === hoveredNode) _hoverConnected.add(s);
    }
  }

  // Draw nodes
  for (const node of nodes) {
    const onHoveredLink = hoveredLink && (hoveredLink.source === node || hoveredLink.target === node);
    const isActive = node === hoveredNode || node === selectedNode || node._connected || onHoveredLink || _hoverConnected.has(node);
    if (node.hidden && !isActive) continue;
    const r = nodeRadius(node);

    ctx.save();
    ctx.globalAlpha = node.stub ? 0.4 : (familyTreeMode && !_familyTreeNodes.has(node)) ? 0.08 : (selectedNode && !isActive ? 0.3 : (node.hidden ? 0.5 : 1));

    // Draw circle
    ctx.beginPath();
    ctx.arc(node.x, node.y, r, 0, Math.PI * 2);

    if (node.stub) {
      ctx.fillStyle = "#3a3d4d";
      ctx.fill();
    } else {
      const thumbLoaded = node.thumbnail && imageCache[node.thumbnail]
        && imageCache[node.thumbnail].complete && imageCache[node.thumbnail].naturalWidth;
      const img = thumbLoaded ? imageCache[node.thumbnail] : silhouetteImg;
      ctx.save();
      ctx.clip();
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const scale = Math.max((r * 2) / iw, (r * 2) / ih);
      const sw = iw * scale, sh = ih * scale;
      const yOff = (sh - r * 2) * 0.4;
      ctx.drawImage(img, node.x - sw / 2, node.y - sh / 2 + yOff, sw, sh);
      ctx.restore();
    }

    // Border
    ctx.beginPath();
    ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = isActive ? "#fff" : nodeColor(node);
    ctx.lineWidth = isActive ? 2.5 : 1.5;
    ctx.stroke();

    // Label — collect for dedup pass below
    if (isActive && !(familyTreeMode && !_familyTreeNodes.has(node))) {
      const dates = node.birth ? `${node.birth}\u2013${node.death || ""}` : null;
      const isTop = TOP_COMPOSERS.has(node.label);
      _pendingLabels.push({ name: node.label, dates, x: node.x, y: node.y + r + 14, top: isTop });
    }

    ctx.restore();
  }

  // Draw labels with overlap avoidance (name + dates on separate lines)
  ctx.textAlign = "center";
  const lblHeight = 26;
  const placed = [];
  for (const lbl of _pendingLabels) {
    const nameW = ctx.measureText(lbl.name).width;
    let y = lbl.y;
    for (let tries = 0; tries < 8; tries++) {
      const overlap = placed.some(p => Math.abs(p.x - lbl.x) < (nameW / 2 + p.w / 2 + 12) && Math.abs(p.y - y) < lblHeight);
      if (!overlap) break;
      y += lblHeight;
    }
    const nameSize = lbl.top ? "14px" : "11px";
    const dateSize = lbl.top ? "11px" : "9px";
    const dateOffset = lbl.top ? 15 : 12;
    ctx.fillStyle = "#e8e8f0";
    ctx.font = `${nameSize} -apple-system, BlinkMacSystemFont, sans-serif`;
    ctx.fillText(lbl.name, lbl.x, y);
    if (lbl.dates) {
      ctx.fillStyle = "#8a8da0";
      ctx.font = `${dateSize} -apple-system, BlinkMacSystemFont, sans-serif`;
      ctx.fillText(lbl.dates, lbl.x, y + dateOffset);
    }
    placed.push({ x: lbl.x, y, w: nameW });
  }

  ctx.restore();

}

// --- Force simulation ---
function _parseYear(v) {
  if (!v) return NaN;
  const m = String(v).match(/\d{3,4}/);
  return m ? +m[0] : NaN;
}

function _neighborBirthYears() {
  const linkIndex = {};
  links.forEach(l => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    const t = typeof l.target === "object" ? l.target.id : l.target;
    if (!linkIndex[s]) linkIndex[s] = [];
    if (!linkIndex[t]) linkIndex[t] = [];
    linkIndex[s].push(t);
    linkIndex[t].push(s);
  });
  const nodeById = {};
  nodes.forEach(n => { nodeById[n.id] = n; });
  const result = {};
  nodes.forEach(n => {
    if (!isNaN(_parseYear(n.birth))) return;
    const neighbors = linkIndex[n.id] || [];
    const nYears = neighbors.map(id => {
      const nb = nodeById[id];
      return nb ? _parseYear(nb.birth) : NaN;
    }).filter(v => !isNaN(v));
    if (nYears.length) {
      result[n.id] = nYears.reduce((a, b) => a + b, 0) / nYears.length;
    }
  });
  return result;
}

function birthXScale() {
  const w = canvas.width / devicePixelRatio;
  const pad = 80;
  const years = nodes.map(n => _parseYear(n.birth)).filter(v => !isNaN(v)).sort((a, b) => a - b);
  if (!years.length) return () => w / 2;
  const neighborYear = _neighborBirthYears();
  return n => {
    let y = _parseYear(n.birth);
    if (isNaN(y)) y = neighborYear[n.id];
    if (!y || isNaN(y)) return w / 2;
    let rank = 0;
    for (let i = 0; i < years.length; i++) {
      if (years[i] <= y) rank = i; else break;
    }
    return pad + (rank / (years.length - 1)) * (w - pad * 2);
  };
}

function birthYScale() {
  const h = canvas.height / devicePixelRatio;
  const pad = 80;
  const years = nodes.map(n => _parseYear(n.birth)).filter(v => !isNaN(v)).sort((a, b) => a - b);
  if (!years.length) return () => h / 2;
  const neighborYear = _neighborBirthYears();
  return n => {
    let y = _parseYear(n.birth);
    if (isNaN(y)) y = neighborYear[n.id];
    if (!y || isNaN(y)) return h / 2;
    let rank = 0;
    for (let i = 0; i < years.length; i++) {
      if (years[i] <= y) rank = i; else break;
    }
    return pad + (rank / (years.length - 1)) * (h - pad * 2);
  };
}

function initSimulation() {
  const xScale = birthXScale();
  const yScale = birthYScale();
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;

  simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(activeLinks()).id(d => d.id).distance(180).strength(0.04))
    .force("charge", d3.forceManyBody().strength(d => d.stub ? 0 : -800).distanceMax(1200))
    .force("x", d3.forceX(d => xScale(d)).strength(0.25))
    .force("y", d3.forceY(h / 2).strength(0.3))
    .force("collide", d3.forceCollide().radius(d => nodeRadius(d) + 4))
    .alphaDecay(0.02)
    .velocityDecay(0.4)
    .on("tick", draw);
}

// --- Zoom & pan ---
const zoom = d3.zoom()
  .scaleExtent([0.1, 8])
  .filter(e => {
    if (e.type === "mousedown" || e.type === "touchstart") {
      const rect = canvas.getBoundingClientRect();
      const mx = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
      const my = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
      if (nodeAt(mx, my)) return false;
    }
    return !e.button;
  })
  .on("zoom", e => { transform = e.transform; draw(); });

d3.select(canvas).call(zoom);

// --- Hit testing ---
function nodeAt(mx, my) {
  const [x, y] = transform.invert([mx, my]);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (n.hidden) continue;
    const dx = n.x - x, dy = n.y - y;
    if (dx * dx + dy * dy < (nodeRadius(n) + 4) ** 2) return n;
  }
  return null;
}

function linkAt(mx, my) {
  const [x, y] = transform.invert([mx, my]);
  const threshold = 6 / transform.k;
  const hitKind = viewMode === "teachers" ? "teacher" : "mentor";
  for (const link of links) {
    if (link.kind !== hitKind) continue;
    const s = link.source, t = link.target;
    if (s.hidden || t.hidden) continue;
    const dx = t.x - s.x, dy = t.y - s.y;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) continue;
    const param = Math.max(0, Math.min(1, ((x - s.x) * dx + (y - s.y) * dy) / lenSq));
    const px = s.x + param * dx, py = s.y + param * dy;
    const dist = Math.sqrt((x - px) ** 2 + (y - py) ** 2);
    if (dist < threshold) return link;
  }
  return null;
}

// --- Mouse interactions ---
canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const node = nodeAt(mx, my);
  let needDraw = false;

  const inPathMode = _pathLinks.size > 0;
  const effectiveNode = (selectedNode && !inPathMode && !familyTreeMode) ? null : node;
  if (effectiveNode !== hoveredNode) {
    hoveredNode = effectiveNode;
    needDraw = true;
  }

  // Check link hover when not on a node and nothing selected (or in path mode)
  const link = (!node && (!selectedNode || inPathMode)) ? linkAt(mx, my) : null;
  if (link !== hoveredLink) {
    hoveredLink = link;
    needDraw = true;
  }

  canvas.style.cursor = node ? "pointer" : (link && (!selectedNode || inPathMode)) ? "pointer" : "default";

  if (node && (!selectedNode || inPathMode || familyTreeMode)) {
    tooltip.style.display = "block";
    tooltip.textContent = node.label + (node.birth ? ` (${node.birth})` : "");
    tooltip.style.left = (mx + 12) + "px";
    tooltip.style.top = (my - 8) + "px";
  } else if (link) {
    const sLabel = (typeof link.source === "object" ? link.source : nodeById[link.source]).label;
    const tLabel = (typeof link.target === "object" ? link.target : nodeById[link.target]).label;
    const meta = window._edgeMeta && window._edgeMeta[link.id];
    const pct = Math.round(link.confidence * 100);
    let tip = `${sLabel} → ${tLabel}\n${link.origin} · ${link.method} · ${pct}%`;
    if (meta && meta.quote) tip += `\n"${meta.quote.length > 120 ? meta.quote.slice(0,117) + '…' : meta.quote}"`;
    tooltip.style.display = "block";
    tooltip.style.whiteSpace = "pre-wrap";
    tooltip.style.maxWidth = "360px";
    tooltip.textContent = tip;
    tooltip.style.left = (mx + 12) + "px";
    tooltip.style.top = (my - 8) + "px";
  } else {
    tooltip.style.display = "none";
  }

  if (needDraw) draw();
});

canvas.addEventListener("click", e => {
  const rect = canvas.getBoundingClientRect();
  const node = nodeAt(e.clientX - rect.left, e.clientY - rect.top);
  const inPathMode = _pathLinks.size > 0;

  if (familyTreeMode) {
    if (node && _familyTreeNodes.has(node)) {
      showDetail(node);
      draw();
    } else {
      clearFamilyTree();
    }
    return;
  }
  if (inPathMode) {
    if (node && _pathNodes.has(node)) {
      showDetail(node);
      draw();
    } else {
      clearLineage();
    }
    return;
  }
  if (!node) selectNode(null);
});

canvas.addEventListener("dblclick", e => {
  const rect = canvas.getBoundingClientRect();
  const node = nodeAt(e.clientX - rect.left, e.clientY - rect.top);
  if (node && node.stub) {
    expandComposer(node.id);
  }
});

function selectNode(node) {
  // Clear family tree if active
  if (familyTreeMode) {
    familyTreeMode = false;
    _familyTreeNodes = new Set();
    _familyTreeLinks = new Set();
    _familyTreeRoot = null;
    document.getElementById("pathClear").style.display = "none";
    document.getElementById("pathClear").textContent = "Clear Lineage";
  }
  // Clear path highlight
  _pathLinks.clear();
  _pathNodes.clear();
  document.getElementById("pathStatus").textContent = "";
  // Clear
  nodes.forEach(n => { n._connected = false; n.fx = null; n.fy = null; });
  links.forEach(l => l.visible = false);

  selectedNode = node;
  if (node) {
    // BFS: find entire connected component
    const adjacency = new Map();
    activeLinks().forEach(l => {
      const s = typeof l.source === "object" ? l.source : nodeById[l.source];
      const t = typeof l.target === "object" ? l.target : nodeById[l.target];
      if (!adjacency.has(s)) adjacency.set(s, []);
      if (!adjacency.has(t)) adjacency.set(t, []);
      adjacency.get(s).push({ node: t, link: l });
      adjacency.get(t).push({ node: s, link: l });
    });

    const visited = new Map();
    const queue = [{n: node, depth: 0}];
    visited.set(node, 0);
    while (queue.length) {
      const {n: cur, depth} = queue.shift();
      cur._connected = true;
      if (depth < connectionDepth) {
        for (const { node: neighbor, link: l } of (adjacency.get(cur) || [])) {
          l.visible = true;
          if (!visited.has(neighbor)) {
            visited.set(neighbor, depth + 1);
            queue.push({n: neighbor, depth: depth + 1});
          }
        }
      }
    }

    // Identify direct connections for layout
    const teachers = [], students = [];
    activeLinks().forEach(l => {
      const s = typeof l.source === "object" ? l.source : nodeById[l.source];
      const t = typeof l.target === "object" ? l.target : nodeById[l.target];
      if (t === node) teachers.push(s);
      else if (s === node) students.push(t);
    });

    showDetail(node);

    {
      // Pin selected node in place, arrange direct teachers left / students right
      const spacing = 80;
      node.fx = node.x;
      node.fy = node.y;

      teachers.forEach((t, i) => {
        const yOff = (i - (teachers.length - 1) / 2) * spacing;
        t.fx = node.x - 160;
        t.fy = node.y + yOff;
      });
      students.forEach((s, i) => {
        const yOff = (i - (students.length - 1) / 2) * spacing;
        s.fx = node.x + 160;
        s.fy = node.y + yOff;
      });

      simulation.alpha(0.5).restart();
      setTimeout(() => {
        simulation.alphaTarget(0);
      }, 1200);
    }

    // Zoom to fit the full connected component
    const component = [...visited.keys()];
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    component.forEach(n => {
      const px = n.fx != null ? n.fx : n.x;
      const py = n.fy != null ? n.fy : n.y;
      x0 = Math.min(x0, px); y0 = Math.min(y0, py);
      x1 = Math.max(x1, px); y1 = Math.max(y1, py);
    });
    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    const pad = 100;
    const dx = (x1 - x0) || 1, dy = (y1 - y0) || 1;
    const targetScale = Math.min((w - pad * 2) / dx, (h - pad * 2) / dy, 2.5);
    const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
    const tx = w / 2 - cx * targetScale;
    const ty = h / 2 - cy * targetScale;
    d3.select(canvas).transition().duration(600)
      .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(targetScale));
  } else {
    clearDetail();
    simulation.alpha(0.3).restart();
  }
  draw();
}

// --- Drag ---
let _dragged = false, _dragStartX = 0, _dragStartY = 0;
d3.select(canvas).call(
  d3.drag()
    .container(canvas)
    .subject(e => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.sourceEvent.clientX - rect.left;
      const my = e.sourceEvent.clientY - rect.top;
      return nodeAt(mx, my);
    })
    .on("start", e => {
      _dragged = false;
      _dragStartX = e.sourceEvent.clientX;
      _dragStartY = e.sourceEvent.clientY;
      if (familyTreeMode) return;
      if (!e.active) simulation.alphaTarget(0.3).restart();
      const [gx, gy] = transform.invert([
        e.sourceEvent.clientX - canvas.getBoundingClientRect().left,
        e.sourceEvent.clientY - canvas.getBoundingClientRect().top,
      ]);
      e.subject.fx = gx;
      e.subject.fy = gy;
    })
    .on("drag", e => {
      const dx = e.sourceEvent.clientX - _dragStartX;
      const dy = e.sourceEvent.clientY - _dragStartY;
      if (dx * dx + dy * dy > 9) _dragged = true;
      if (familyTreeMode) return;
      const rect = canvas.getBoundingClientRect();
      const [gx, gy] = transform.invert([
        e.sourceEvent.clientX - rect.left,
        e.sourceEvent.clientY - rect.top,
      ]);
      e.subject.fx = gx;
      e.subject.fy = gy;
    })
    .on("end", e => {
      if (!familyTreeMode) {
        if (!e.active) simulation.alphaTarget(0);
        e.subject.fx = null;
        e.subject.fy = null;
      }
      if (!_dragged) {
        if (familyTreeMode) {
          if (_familyTreeNodes.has(e.subject)) {
            showDetail(e.subject);
            draw();
          } else {
            clearFamilyTree();
          }
        } else if (_pathLinks.size > 0) {
          if (_pathNodes.has(e.subject)) {
            showDetail(e.subject);
            draw();
          } else {
            clearLineage();
          }
        } else {
          selectNode(e.subject);
        }
      }
    })
);

// --- Data loading ---
async function load() {
  let res = await fetch("graph.json").catch(() => null);
  if (!res || !res.ok) res = await fetch("/graph");
  const data = await res.json();
  currentData = data;
  buildGraph(data);
}

function buildGraph(data) {
  nodes = data.nodes.map(n => ({
    id: n.data.id,
    label: n.data.label,
    birth: n.data.birth,
    death: n.data.death,
    nationality: n.data.nationality,
    era: n.data.era,
    eraBucket: eraBucket(n.data.era, n.data.birth),
    stub: n.data.stub,
    woman: n.data.woman || false,
    wikipedia: n.data.wikipedia,
    thumbnail: n.data.thumbnail,
    hidden: false,
    _connected: false,
  }));

  nodeById = {};
  nodes.forEach(n => {
    nodeById[n.id] = n;
    if (n.thumbnail) loadImage(n.thumbnail);
  });

  const _edgeMeta = {};
  links = data.edges.map(e => {
    const id = e.data.id;
    _edgeMeta[id] = { url: e.data.source_url, quote: e.data.quote || "", fileOwner: e.data.file_owner, field: e.data.field, edgeName: e.data.edge_name, corroboratedBy: e.data.corroborated_by || null, verified: e.data.verified || false };
    return {
      id: id,
      source: e.data.source,
      target: e.data.target,
      kind: e.data.kind,
      source_tag: e.data.source_tag,
      origin: e.data.origin || "unknown",
      method: e.data.method || "unknown",
      confidence: e.data.confidence || 0.5,
      verified: e.data.verified || false,
      visible: false,
    };
  });
  window._edgeMeta = _edgeMeta;

  selectedNode = null;
  hoveredNode = null;

  resize();
  initSimulation();
  populateEraFilter();
  updateStats(data);
  buildLegend();
}

function buildLegend() {
  const present = new Set(nodes.map(n => n.eraBucket).filter(Boolean));
  const eras = ERA_ORDER.filter(e => present.has(e));
  const el = document.getElementById("legendEras");
  el.innerHTML = eras.map(e =>
    `<div><span class="swatch" style="background:${ERA_COLORS[e]}"></span>${e} (${ERA_RANGES[e][0]}–${ERA_RANGES[e][1]})</div>`
  ).join("");
}

function populateEraFilter() {
  const present = new Set(nodes.map(n => n.eraBucket).filter(Boolean));
  const buckets = ERA_ORDER.filter(e => present.has(e));
  const sel = document.getElementById("eraFilter");
  sel.innerHTML = '<option value="">All eras</option>';
  buckets.forEach(b => {
    const o = document.createElement("option");
    o.value = b; o.textContent = b; sel.appendChild(o);
  });
  sel.onchange = () => {
    applyFilters();
    draw();
  };
}

function applyFilters() {
  const era = document.getElementById("eraFilter").value;
  const womenOnly = document.getElementById("womenFilter").checked;
  nodes.forEach(n => {
    if (n.stub) { n.hidden = false; return; }
    let hide = false;
    if (era && n.eraBucket !== era) hide = true;
    if (womenOnly && !n.woman) hide = true;
    n.hidden = hide;
  });
}

document.getElementById("womenFilter").addEventListener("change", () => {
  applyFilters();
  draw();
});

function updateStats(data) {
  const seeded = data.nodes.filter(n => !n.data.stub).length;
  const stubs = data.nodes.filter(n => n.data.stub).length;
  const teacherEdges = data.edges.filter(e => e.data.kind === "teacher").length;
  document.getElementById("stats").innerHTML =
    `${seeded} composers · ${stubs} stubs<br>${teacherEdges} teacher/student relationships`;
}

function showDetail(node) {
  const el = document.getElementById("detailBody");
  el.classList.remove("empty");

  const edgeMapper = l => {
    const meta = _edgeMeta[l.id] || {};
    return { linkObj: l, tag: l.source_tag, url: meta.url, quote: meta.quote, fileOwner: meta.fileOwner, field: meta.field, edgeName: meta.edgeName, verified: meta.verified || false };
  };

  const teachersIn = links.filter(l => {
    const t = typeof l.target === "object" ? l.target : nodeById[l.target];
    return t === node && l.kind === "teacher";
  }).map(l => ({ node: typeof l.source === "object" ? l.source : nodeById[l.source], ...edgeMapper(l) })).filter(e => e.node);

  const studentsOut = links.filter(l => {
    const s = typeof l.source === "object" ? l.source : nodeById[l.source];
    return s === node && l.kind === "teacher";
  }).map(l => ({ node: typeof l.target === "object" ? l.target : nodeById[l.target], ...edgeMapper(l) })).filter(e => e.node);

  const mentorsIn = links.filter(l => {
    const t = typeof l.target === "object" ? l.target : nodeById[l.target];
    return t === node && l.kind === "mentor";
  }).map(l => ({ node: typeof l.source === "object" ? l.source : nodeById[l.source], ...edgeMapper(l) })).filter(e => e.node);

  let _quoteCounter = 0;
  const _escHtml = s => (s || "").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const _confBadge = (conf) => {
    const pct = Math.round(conf * 100);
    const cls = conf >= 0.85 ? "conf-high" : "conf-mid";
    return `<span class="conf-badge ${cls}">${pct}%</span>`;
  };

  const listHtml = (arr) => {
    if (!arr.length) return '<div class="empty">—</div>';
    const html = '<ul class="edge-list">' + arr.map(e => {
      const dates = e.node.birth ? ` <span style="color:var(--muted);font-size:10px">(${e.node.birth}\u2013${e.node.death || ""})</span>` : "";
      const highlightText = e.quote || e.node.label || e.node.id;
      const conf = e.linkObj ? e.linkObj.confidence : 0.5;
      const origin = e.linkObj ? e.linkObj.origin : "unknown";
      const method = e.linkObj ? e.linkObj.method : "unknown";
      const badge = _confBadge(conf);
      const qid = `llmq${_quoteCounter++}`;
      const quoteBlock = e.quote ? `<div style="margin-top:4px;font-style:italic;color:#5a7a8a;font-size:11px">\u201c${_escHtml(e.quote)}\u201d</div>` : "";
      const wikiLink = e.url ? `<div style="margin-top:4px"><a class="src-verify" data-url="${_escHtml(e.url)}" data-quote="${_escHtml(e.quote || highlightText)}" style="color:var(--wiki);font-size:10px;cursor:pointer">see on Wikipedia \u2197</a></div>` : "";
      const meta = window._edgeMeta && window._edgeMeta[e.linkObj ? e.linkObj.id : ""];
      const corrobLine = meta && meta.corroboratedBy ? `<div class="edge-prov" style="color:#4ade80">corroborated by: ${meta.corroboratedBy.join(", ")}</div>` : "";
      const isVerified = e.verified || (meta && meta.verified);
      const verifiedLine = isVerified ? `<div class="edge-prov" style="color:#4ade80;font-weight:600">\u2713 manually verified</div>` : "";
      let actionBtns = "";
      if (!isVerified && e.fileOwner && e.field) {
        if (_isLocalhost) {
          actionBtns = `<div style="margin-top:4px;display:flex;gap:4px"><button class="verify-edge" data-owner="${_escHtml(e.fileOwner)}" data-target="${_escHtml(e.node.id)}" data-field="${_escHtml(e.field)}" data-link-id="${_escHtml(e.linkObj ? e.linkObj.id : "")}" style="background:#2a6;color:white;border:none;padding:3px 8px;font-size:10px;border-radius:3px;cursor:pointer">verify \u2713</button><button class="flag-edge" data-owner="${_escHtml(e.fileOwner)}" data-target="${_escHtml(e.node.id)}" data-field="${_escHtml(e.field)}" data-link-id="${_escHtml(e.linkObj ? e.linkObj.id : "")}" style="background:#c44;color:white;border:none;padding:3px 8px;font-size:10px;border-radius:3px;cursor:pointer">flag: incorrect \u2717</button></div>`;
        } else {
          const issueTitle = encodeURIComponent(`Edge correction: ${node.label} \u2194 ${e.node.label}`);
          const issueBody = encodeURIComponent(`**Composer:** ${node.label}\n**${e.field === "teachers" ? "Teacher" : "Student"}:** ${e.node.label}\n**Source:** ${origin} \u00b7 ${method}\n**Confidence:** ${Math.round(conf * 100)}%\n${e.quote ? `**Quote:** \u201c${e.quote}\u201d\n` : ""}\n**What\u2019s wrong?**\n_Please describe the issue:_\n`);
          actionBtns = `<div style="margin-top:4px"><a href="https://github.com/allegrachapman/composer-galaxy/issues/new?title=${issueTitle}&body=${issueBody}&labels=correction" target="_blank" rel="noopener" style="background:#555;color:white;border:none;padding:3px 8px;font-size:10px;border-radius:3px;cursor:pointer;text-decoration:none;display:inline-block">suggest correction</a></div>`;
        }
      }
      const detailContent = `<div class="edge-prov">${origin} \u00b7 ${method}</div>${verifiedLine}${corrobLine}${quoteBlock}${wikiLink}${actionBtns}`;
      const details = `<span class="src-toggle" data-qid="${qid}" style="color:var(--muted);font-size:10px;margin-left:4px;cursor:pointer">details \u25be</span><div id="${qid}" class="llm-quote">${badge}${detailContent}</div>`;
      return `<li data-node-id="${_escHtml(e.node.id)}">${e.node.label || e.node.id}${dates}${details}</li>`;
    }).join("") + '</ul>';
    return html;
  };

  const setupDetailListeners = () => {
    const btn = document.getElementById("familyTreeBtn");
    if (btn) btn.addEventListener("click", () => showFamilyTree(node));
    const clearBtn = document.getElementById("familyTreeClearBtn");
    if (clearBtn) {
      clearBtn.style.display = familyTreeMode ? "block" : "none";
      clearBtn.addEventListener("click", () => clearFamilyTree());
    }
  };

  el.innerHTML = `
    ${node.thumbnail ? `<img src="${node.thumbnail}" alt="${node.label}" style="width:100%;border-radius:8px;margin-bottom:12px;">` : ""}
    <h1 style="font-size:15px">${node.label}</h1>
    <div class="detail-row"><span class="k">Life</span>${node.birth || "?"} – ${node.death || ""}</div>
    <div class="detail-row"><span class="k">Nationality</span>${node.nationality || "—"}</div>
    <div class="detail-row"><span class="k">Era</span>${node.era || "—"}</div>
    ${node.wikipedia ? `<div class="detail-row"><a href="${node.wikipedia}" target="_blank">Wikipedia ↗</a></div>` : ""}
    <button id="familyTreeBtn" style="margin:8px 0;background:var(--accent);color:white;border:none;padding:7px 0;font-size:12px;border-radius:4px;cursor:pointer">Show Family Tree</button>
    <button id="familyTreeClearBtn" style="display:none;margin:0 0 8px;background:#555;color:white;border:none;padding:7px 0;font-size:12px;border-radius:4px;cursor:pointer">Clear Family Tree</button>
    <h2>Teachers</h2>${listHtml(teachersIn)}<h2>Students</h2>${listHtml(studentsOut)}
  `;
  setupDetailListeners();
}

document.getElementById("zoomFit").addEventListener("click", () => {
  if (!nodes.length) return;
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
  nodes.forEach(n => {
    if (n.hidden) return;
    x0 = Math.min(x0, n.x); y0 = Math.min(y0, n.y);
    x1 = Math.max(x1, n.x); y1 = Math.max(y1, n.y);
  });
  const pad = 60;
  const dx = x1 - x0 || 1, dy = y1 - y0 || 1;
  const scale = Math.min((w - pad * 2) / dx, (h - pad * 2) / dy, 3);
  const cx = (x0 + x1) / 2, cy2 = (y0 + y1) / 2;
  const tx = w / 2 - cx * scale, ty = h / 2 - cy2 * scale;
  d3.select(canvas).transition().duration(500)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
});

// --- Search ---
const searchInput = document.getElementById("searchInput");
const searchResults = document.getElementById("searchResults");
let searchActive = -1;
const stripDiacritics = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

searchInput.addEventListener("input", () => {
  const q = stripDiacritics(searchInput.value.trim());
  searchResults.innerHTML = "";
  searchActive = -1;
  if (q.length < 2) { searchResults.style.display = "none"; return; }
  const matches = nodes.filter(n => stripDiacritics(n.label).includes(q))
    .sort((a, b) => {
      const al = stripDiacritics(a.label), bl = stripDiacritics(b.label);
      const aStart = al.startsWith(q) ? 0 : 1;
      const bStart = bl.startsWith(q) ? 0 : 1;
      return aStart - bStart || al.localeCompare(bl);
    })
    .slice(0, 12);
  if (!matches.length) { searchResults.style.display = "none"; return; }
  matches.forEach((n, i) => {
    const li = document.createElement("li");
    li.textContent = n.label + (n.birth ? ` (${n.birth})` : "");
    li.addEventListener("click", () => pickSearch(n));
    searchResults.appendChild(li);
  });
  searchResults.style.display = "block";
});

searchInput.addEventListener("keydown", e => {
  const items = searchResults.querySelectorAll("li");
  if (!items.length) return;
  if (e.key === "ArrowDown") {
    e.preventDefault();
    searchActive = Math.min(searchActive + 1, items.length - 1);
    items.forEach((li, i) => li.classList.toggle("active", i === searchActive));
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    searchActive = Math.max(searchActive - 1, 0);
    items.forEach((li, i) => li.classList.toggle("active", i === searchActive));
  } else if (e.key === "Enter" && searchActive >= 0) {
    e.preventDefault();
    const q = stripDiacritics(searchInput.value.trim());
    const matches = nodes.filter(n => stripDiacritics(n.label).includes(q))
      .sort((a, b) => {
        const al = stripDiacritics(a.label), bl = stripDiacritics(b.label);
        const aStart = al.startsWith(q) ? 0 : 1;
        const bStart = bl.startsWith(q) ? 0 : 1;
        return aStart - bStart || al.localeCompare(bl);
      })
      .slice(0, 12);
    if (matches[searchActive]) pickSearch(matches[searchActive]);
  } else if (e.key === "Escape") {
    searchResults.style.display = "none";
    searchActive = -1;
  }
});

// --- Path finder ---
let _pathFromNode = null, _pathToNode = null;
let _pathLinks = new Set(), _pathNodes = new Set();

function _setupPathAutocomplete(inputId, resultsId, onPick) {
  const input = document.getElementById(inputId);
  const results = document.getElementById(resultsId);
  input.addEventListener("input", () => {
    const q = stripDiacritics(input.value.trim());
    results.innerHTML = "";
    if (q.length < 2) { results.style.display = "none"; return; }
    const matches = nodes.filter(n => !n.stub && stripDiacritics(n.label).includes(q))
      .sort((a, b) => {
        const al = stripDiacritics(a.label), bl = stripDiacritics(b.label);
        return (al.startsWith(q) ? 0 : 1) - (bl.startsWith(q) ? 0 : 1) || al.localeCompare(bl);
      }).slice(0, 8);
    if (!matches.length) { results.style.display = "none"; return; }
    matches.forEach(n => {
      const li = document.createElement("li");
      li.textContent = n.label + (n.birth ? ` (${n.birth})` : "");
      li.style.cssText = "padding:6px 8px;font-size:13px;cursor:pointer";
      li.addEventListener("mouseenter", () => li.style.background = "var(--bg)");
      li.addEventListener("mouseleave", () => li.style.background = "");
      li.addEventListener("click", () => {
        input.value = n.label;
        results.style.display = "none";
        onPick(n);
      });
      results.appendChild(li);
    });
    results.style.display = "block";
  });
  input.addEventListener("focus", () => { if (input.value.length >= 2) input.dispatchEvent(new Event("input")); });
}

_setupPathAutocomplete("pathFrom", "pathFromResults", n => { _pathFromNode = n; });
_setupPathAutocomplete("pathTo", "pathToResults", n => { _pathToNode = n; });

function findPath() {
  const status = document.getElementById("pathStatus");
  _pathLinks.clear();
  _pathNodes.clear();

  if (!_pathFromNode || !_pathToNode) {
    status.textContent = "Select both composers first.";
    draw();
    return;
  }
  if (_pathFromNode === _pathToNode) {
    status.textContent = "Same composer selected.";
    draw();
    return;
  }

  // Build adjacency
  const adj = new Map();
  activeLinks().forEach(l => {
    const s = typeof l.source === "object" ? l.source : nodeById[l.source];
    const t = typeof l.target === "object" ? l.target : nodeById[l.target];
    if (!adj.has(s)) adj.set(s, []);
    if (!adj.has(t)) adj.set(t, []);
    adj.get(s).push({ node: t, link: l });
    adj.get(t).push({ node: s, link: l });
  });

  // BFS
  const prev = new Map();
  const visited = new Set();
  const queue = [_pathFromNode];
  visited.add(_pathFromNode);
  let found = false;

  while (queue.length) {
    const cur = queue.shift();
    if (cur === _pathToNode) { found = true; break; }
    for (const { node: nb, link: l } of (adj.get(cur) || [])) {
      if (!visited.has(nb)) {
        visited.add(nb);
        prev.set(nb, { node: cur, link: l });
        queue.push(nb);
      }
    }
  }

  if (!found) {
    status.textContent = `No path between ${_pathFromNode.label} and ${_pathToNode.label}.`;
    // Clear selection so full graph is visible
    selectedNode = null;
    nodes.forEach(n => { n._connected = false; });
    links.forEach(l => l.visible = false);
    draw();
    return;
  }

  // Trace path
  const pathChain = [];
  let cur = _pathToNode;
  while (prev.has(cur)) {
    const p = prev.get(cur);
    _pathLinks.add(p.link);
    _pathNodes.add(cur);
    _pathNodes.add(p.node);
    pathChain.unshift(p.node.label);
    cur = p.node;
  }
  pathChain.push(_pathToNode.label);

  const steps = pathChain.length - 1;
  status.innerHTML = `<strong>${steps} degree${steps !== 1 ? "s" : ""} of separation</strong><br>` +
    pathChain.join(" → ");
  document.getElementById("pathClear").style.display = "block";

  // Update visibility: show only path
  selectedNode = _pathFromNode;
  nodes.forEach(n => { n._connected = _pathNodes.has(n); });
  links.forEach(l => { l.visible = _pathLinks.has(l); });

  showDetail(_pathFromNode);
  draw();
}

function clearLineage() {
  _pathLinks.clear();
  _pathNodes.clear();
  document.getElementById("pathStatus").textContent = "";
  document.getElementById("pathClear").style.display = "none";
  selectedNode = null;
  nodes.forEach(n => { n._connected = false; });
  links.forEach(l => l.visible = false);
  document.getElementById("detailBody").innerHTML = "";
  draw();
}

    ev.stopPropagation();
    const q = document.getElementById(toggle.dataset.qid);
    if (q) q.classList.toggle("open");
    return;
  }
  const verify = ev.target.closest(".src-verify");
  if (verify) {
    ev.preventDefault();
    ev.stopPropagation();
    const url = verify.dataset.url;
    if (!url) return;
    let quote = (verify.dataset.quote || "").trim();
    if (quote.length > 80) quote = quote.slice(0, 80).replace(/\s+\S*$/, "");
    window.open(`${url}#:~:text=${encodeURIComponent(quote)}`, "_blank", "noopener");
    return;
  }
  const verifyBtn = ev.target.closest(".verify-edge");
  if (verifyBtn) {
    ev.stopPropagation();
    const { owner, target, field, linkId } = verifyBtn.dataset;
    verifyBtn.textContent = "Verifying…";
    verifyBtn.style.pointerEvents = "none";
    fetch("/verify-edge", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ composer: owner, target: target, field: field }),
    }).then(r => {
      if (!r.ok) throw new Error("Failed");
      const link = links.find(l => l.id === linkId);
      if (link) { link.verified = true; link.confidence = 0.95; }
      const meta = window._edgeMeta[linkId];
      if (meta) meta.verified = true;
      if (selectedNode) showDetail(selectedNode);
      draw();
    }).catch(() => {
      verifyBtn.textContent = "Failed — retry";
      verifyBtn.style.pointerEvents = "";
    });
    return;
  }
  const flagBtn = ev.target.closest(".flag-edge");
  if (flagBtn) {
    ev.stopPropagation();
    const { owner, target, field, linkId } = flagBtn.dataset;
    if (!confirm("Flag this edge as incorrect? It will be removed from the graph.")) return;
    flagBtn.textContent = "Flagging…";
    flagBtn.style.pointerEvents = "none";
    fetch("/flag-edge", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ composer: owner, target: target, field: field }),
    }).then(r => {
      if (!r.ok) throw new Error("Failed");
      const idx = links.findIndex(l => l.id === linkId);
      if (idx !== -1) links.splice(idx, 1);
      if (selectedNode) showDetail(selectedNode);
      draw();
    }).catch(() => {
      flagBtn.textContent = "Failed — retry";
      flagBtn.style.pointerEvents = "";
    });
    return;
  }
  if (ev.target.closest(".llm-quote")) return;
  const li = ev.target.closest(".edge-list li");
  if (li) {
    const nid = li.dataset.nodeId;
    if (nid && nodeById[nid]) {
      if (_pathLinks.size > 0) {
        showDetail(nodeById[nid]);
        draw();
      } else {
        selectNode(nodeById[nid]);
      }
    }
  }
});

window.addEventListener("resize", resize);
load();

// --- Ask ---
const askInput = document.getElementById("askInput");
const askBtn = document.getElementById("askBtn");
const askAnswer = document.getElementById("askAnswer");

function answerFromGraph(q) {
  const ql = q.toLowerCase();
  const teacherLinks = links.filter(l => l.kind === "teacher");
  const nonStubNodes = nodes.filter(n => !n.stub);

  // Count helpers
  const studentCount = {};
  const teacherCount = {};
  teacherLinks.forEach(l => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    const t = typeof l.target === "object" ? l.target.id : l.target;
    studentCount[s] = (studentCount[s] || 0) + 1;
    teacherCount[t] = (teacherCount[t] || 0) + 1;
  });

  // "most students"
  if (/most students/i.test(ql)) {
    const sorted = Object.entries(studentCount).sort((a,b) => b[1]-a[1]).slice(0,10);
    return "Composers with the most students:\n" + sorted.map(([id,c],i) =>
      `${i+1}. ${(nodeById[id]||{}).label||id} — ${c} students`).join("\n");
  }

  // "most teachers"
  if (/most teachers/i.test(ql)) {
    const sorted = Object.entries(teacherCount).sort((a,b) => b[1]-a[1]).slice(0,10);
    return "Composers with the most teachers:\n" + sorted.map(([id,c],i) =>
      `${i+1}. ${(nodeById[id]||{}).label||id} — ${c} teachers`).join("\n");
  }

  // "most connected"
  if (/most connected|most connections|most relationships/i.test(ql)) {
    const connCount = {};
    teacherLinks.forEach(l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      connCount[s] = (connCount[s] || 0) + 1;
      connCount[t] = (connCount[t] || 0) + 1;
    });
    const sorted = Object.entries(connCount).sort((a,b) => b[1]-a[1]).slice(0,10);
    return "Most connected composers:\n" + sorted.map(([id,c],i) =>
      `${i+1}. ${(nodeById[id]||{}).label||id} — ${c} connections`).join("\n");
  }

  // "how many composers" / "how many nodes" / "total"
  if (/how many (composers|nodes|people)/i.test(ql)) {
    return `There are ${nonStubNodes.length} composers in the graph (plus ${nodes.length - nonStubNodes.length} stub nodes referenced but not yet fully added).`;
  }

  // "how many edges" / "how many relationships" / "how many connections"
  if (/how many (edges|relationships|connections|links)/i.test(ql)) {
    return `There are ${teacherLinks.length} teacher/student relationships in the graph.`;
  }

  // "who taught X" / "X's teachers"
  const taughtMatch = ql.match(/who taught (.+?)[\?]?$/i) || ql.match(/(.+?)(?:'s|s') teachers/i);
  if (taughtMatch) {
    const name = taughtMatch[1].trim();
    const node = nodes.find(n => n.label.toLowerCase() === name || n.id.toLowerCase() === name);
    if (!node) return `Couldn't find a composer named "${taughtMatch[1].trim()}" in the graph.`;
    const teachers = teacherLinks
      .filter(l => (typeof l.target === "object" ? l.target : nodeById[l.target]) === node)
      .map(l => (typeof l.source === "object" ? l.source : nodeById[l.source]).label);
    if (!teachers.length) return `No teachers found for ${node.label}.`;
    return `${node.label}'s teachers: ${teachers.join(", ")}`;
  }

  // "who did X teach" / "X's students"
  const studMatch = ql.match(/who did (.+?) teach/i) || ql.match(/(.+?)(?:'s|s') students/i);
  if (studMatch) {
    const name = studMatch[1].trim();
    const node = nodes.find(n => n.label.toLowerCase() === name || n.id.toLowerCase() === name);
    if (!node) return `Couldn't find a composer named "${studMatch[1].trim()}" in the graph.`;
    const students = teacherLinks
      .filter(l => (typeof l.source === "object" ? l.source : nodeById[l.source]) === node)
      .map(l => (typeof l.target === "object" ? l.target : nodeById[l.target]).label);
    if (!students.length) return `No students found for ${node.label}.`;
    return `${node.label}'s students: ${students.join(", ")}`;
  }

  // "women composers" stats
  if (/how many women|women composers/i.test(ql)) {
    const women = nonStubNodes.filter(n => n.woman);
    return `There are ${women.length} women composers in the graph out of ${nonStubNodes.length} total (${Math.round(100*women.length/nonStubNodes.length)}%).`;
  }

  // era breakdown
  if (/era breakdown|eras|by era|which eras/i.test(ql)) {
    const eraCounts = {};
    nonStubNodes.forEach(n => { if (n.eraBucket) eraCounts[n.eraBucket] = (eraCounts[n.eraBucket]||0) + 1; });
    const sorted = Object.entries(eraCounts).sort((a,b) => b[1]-a[1]);
    return "Composers by era:\n" + sorted.map(([e,c]) => `  ${e}: ${c}`).join("\n");
  }

  // confidence stats
  if (/confidence|accuracy|how accurate|data quality/i.test(ql)) {
    const buckets = {"95-100%":0, "85-94%":0, "80-84%":0, "<80%":0};
    teacherLinks.forEach(l => {
      const c = l.confidence;
      if (c >= 0.95) buckets["95-100%"]++;
      else if (c >= 0.85) buckets["85-94%"]++;
      else if (c >= 0.80) buckets["80-84%"]++;
      else buckets["<80%"]++;
    });
    return "Edge confidence distribution:\n" + Object.entries(buckets).map(([k,v]) => `  ${k}: ${v} edges`).join("\n");
  }

  // oldest / earliest
  if (/oldest|earliest|first born/i.test(ql)) {
    const withBirth = nonStubNodes.filter(n => n.birth && /^\d+/.test(String(n.birth)));
    withBirth.sort((a,b) => parseInt(a.birth) - parseInt(b.birth));
    const top = withBirth.slice(0,10);
    return "Earliest composers:\n" + top.map((n,i) => `${i+1}. ${n.label} (b. ${n.birth})`).join("\n");
  }

  // youngest / most recent
  if (/youngest|newest|most recent|latest born/i.test(ql)) {
    const withBirth = nonStubNodes.filter(n => n.birth && /^\d+/.test(String(n.birth)));
    withBirth.sort((a,b) => parseInt(b.birth) - parseInt(a.birth));
    const top = withBirth.slice(0,10);
    return "Most recent composers:\n" + top.map((n,i) => `${i+1}. ${n.label} (b. ${n.birth})`).join("\n");
  }

  return null;
}

async function askQuestion() {
  const q = askInput.value.trim();
  if (!q) return;
  askBtn.disabled = true;
  askBtn.textContent = "Thinking…";
  askAnswer.style.display = "block";
  askAnswer.textContent = "…";

  const local = answerFromGraph(q);
  if (local) {
    askAnswer.textContent = local;
    askBtn.disabled = false;
    askBtn.textContent = "Ask";
    return;
  }

  try {
    const res = await fetch("/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q }),
    });
    if (!res.ok) throw new Error(res.status === 405 ? null : await res.text());
    const data = await res.json();
    askAnswer.textContent = data.answer;
  } catch (e) {
    askAnswer.textContent = "I can answer questions like:\n• Who had the most students?\n• Who taught [name]?\n• How many women composers?\n• What's the era breakdown?\n• How accurate is the data?\n• Who are the most connected composers?";
  } finally {
    askBtn.disabled = false;
    askBtn.textContent = "Ask";
  }
}

askBtn.addEventListener("click", askQuestion);
askInput.addEventListener("keydown", e => { if (e.key === "Enter") askQuestion(); });
</script>
